<!DOCTYPE html>
<html>
<head>
<title>Water Quality Monitoring System</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(120deg,#4facfe,#00f2fe);
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:420px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-bottom:25px;
color:#333;
}

label{
display:block;
margin-top:15px;
text-align:left;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

input:focus{
border-color:#007bff;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:25px;
font-size:22px;
font-weight:bold;
}

/* Result colors */

.safe{
color:green;
}

.moderate{
color:orange;
}

.unsafe{
color:red;
}

footer{
margin-top:20px;
font-size:12px;
color:gray;
}

</style>

<script>

function predictWater(event){

event.preventDefault();

let ph=document.getElementById("ph").value;
let turbidity=document.getElementById("turbidity").value;
let oxygen=document.getElementById("oxygen").value;
let temp=document.getElementById("temperature").value;

let params=new URLSearchParams();

params.append("ph",ph);
params.append("turbidity",turbidity);
params.append("oxygen",oxygen);
params.append("temperature",temp);

fetch("ServletWater",{
method:"POST",
body:params
})
.then(response=>response.json())
.then(data=>{

let result=document.getElementById("result");

result.innerText=data.status;

result.className="result";

if(data.status.toLowerCase().includes("safe"))
result.classList.add("safe");

else if(data.status.toLowerCase().includes("moderate"))
result.classList.add("moderate");

else
result.classList.add("unsafe");

})
.catch(error=>{

document.getElementById("result").innerText="Error contacting server";

});

}

</script>

</head>

<body>

<div class="container">

<h1>Water Quality Monitor</h1>

<form onsubmit="predictWater(event)">

<label>pH Level</label>
<input type="number" id="ph" step="0.01" required>

<label>Turbidity (NTU)</label>
<input type="number" id="turbidity" step="0.01" required>

<label>Dissolved Oxygen (mg/L)</label>
<input type="number" id="oxygen" step="0.01" required>

<label>Temperature (°C)</label>
<input type="number" id="temperature" step="0.01" required>

<button type="submit">Predict Water Quality</button>

</form>

<div id="result" class="result">
Result will appear here
</div>

<footer>
Water Quality Monitoring System
</footer>

</div>

</body>
</html>
